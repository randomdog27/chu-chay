<script>
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
const totalLetters = 150;
const mouse = { x: -9999, y: -9999 };

document.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

for (let i = 0; i < totalLetters; i++) {
    createLetter();
}

function createLetter() {
    const el = document.createElement("span");
    el.className = "letter";
    el.textContent = letters[Math.floor(Math.random() * letters.length)];

    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight;

    let vx = 0;
    let vy = 0;

    const fallSpeed = 0.3 + Math.random() * 0.7;
    const repelRadius = 120;

    el.style.fontSize = (14 + Math.random() * 26) + "px";
    el.style.color = "#00ffcc";
    el.style.position = "fixed";
    el.style.pointerEvents = "none";

    document.body.appendChild(el);

    function animate() {

        // rơi xuống bình thường
        vy += 0.01;
        y += fallSpeed;

        // tính khoảng cách tới chuột
        const dx = x - mouse.x;
        const dy = y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < repelRadius) {
            const force = (repelRadius - dist) / repelRadius;
            vx += (dx / dist) * force * 2;
            vy += (dy / dist) * force * 2;
        }

        // ma sát để mượt
        vx *= 0.95;
        vy *= 0.95;

        x += vx;
        y += vy;

        // reset khi ra khỏi màn hình
        if (y > window.innerHeight) {
            y = -20;
            x = Math.random() * window.innerWidth;
        }

        el.style.transform = `translate(${x}px, ${y}px)`;

        requestAnimationFrame(animate);
    }

    animate();
}
</script>
